<section class="box-responsive">
    <header class="header-seccion">
      <h2 class="mat-headline-5">Mi Inventario / Menú</h2>
      <button mat-raised-button color="primary" (click)="abrirFormulario()">
        <mat-icon>add</mat-icon> Nuevo Producto
      </button>
    </header>

    @if (mostrarFormulario()) {
      <mat-card class="formulario-card">
        <form [formGroup]="formGroup" class="grid-form">
          <mat-form-field appearance="outline">
            <mat-label>Nombre del producto</mat-label>
            <input matInput formControlName="nombre">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Precio</mat-label>
            <input matInput type="number" formControlName="price">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Categoría Interna</mat-label>
            <input matInput formControlName="categoriaItem" placeholder="Ej: Bebidas, Herramientas">
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Descripción</mat-label>
            <textarea matInput formControlName="descripcion"></textarea>
          </mat-form-field>

          <div class="acciones-form">
            <button mat-button (click)="mostrarFormulario.set(false)">Cancelar</button>
            <button mat-flat-button color="primary" [disabled]="formGroup.invalid" (click)="guardar()">
              Guardar Producto
            </button>
          </div>
        </form>
      </mat-card>
    }

    <table mat-table [dataSource]="datosCatalogo()" class="mat-elevation-z2 full-width">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef> Producto </th>
        <td mat-cell *matCellDef="let p"> {{p.nombre}} </td>
      </ng-container>

      <ng-container matColumnDef="precio">
        <th mat-header-cell *matHeaderCellDef> Precio </th>
        <td mat-cell *matCellDef="let p"> {{p.precio | currency}} </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let p">
          <button mat-icon-button color="warn" (click)="borrar(p)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas">底</tr>
      <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
    </table>
  </section>
