<section class="box-responsive">
    <header class="market-header">
      <h2 class="mat-headline-5">Vitrina Cooaguia</h2>
      <p>Los mejores productos de tu sector en un solo lugar.</p>
    </header>

    <div class="productos-grid">
      @for (prod of todosLosProductos(); track prod.idProducto) {
        <mat-card class="product-card">
          <div class="badge-negocio" [routerLink]="['/negocio', prod.slugNegocio]">
            <img [src]="prod.logoNegocio" alt="Logo">
            <span>{{ prod.nombreNegocio }}</span>
          </div>
          
          <img mat-card-image [src]="prod.urlImagen" [alt]="prod.nombre" class="img-prod">
          
          <mat-card-content>
            <h3 class="prod-nombre">{{ prod.nombre }}</h3>
            <p class="prod-precio">{{ prod.precio | currency }}</p>
            <p class="prod-barrio"><mat-icon>place</mat-icon> {{ prod.barrio }}</p>
          </mat-card-content>

          <mat-card-actions>
            <button mat-button color="primary" [routerLink]="['/negocio', prod.slugNegocio]">
              Ver Catálogo
            </button>
            <button mat-flat-button color="accent" (click)="comprarDirecto(prod)">
              Comprar
            </button>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  </section>
