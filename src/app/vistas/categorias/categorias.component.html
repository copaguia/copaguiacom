

  <mat-toolbar>

  </mat-toolbar>

    @for (categoria of categorias(); track $index) {

              <app-carrusel [conector]="categoria.tarjetas"></app-carrusel> 
          </div>

          <app-scroll-botones [conector]="categoria.seccion"></app-scroll-botones>
