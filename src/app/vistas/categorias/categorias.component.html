<mat-toolbar class="custom-toolbar">
  <!-- Título a la izquierda -->
  <span>
    <strong>CATEGORIAS</strong>
  </span>

  <!-- Este spacer empuja todo lo que sigue hacia la derecha -->
  <span class="toolbar-spacer"></span>

  <!-- Botón con el avatar del usuario que activa el menú -->
  <button mat-icon-button [matMenuTriggerFor]="userMenu" *ngIf="authService.perfilLectura() as perfil">
    <img [src]="perfil.urlFoto" class="user-avatar" alt="Avatar del usuario">
  </button>
</mat-toolbar>

<!-- Definición del Menú Desplegable -->
<mat-menu #userMenu="matMenu">
  <button mat-menu-item (click)="navigateTo('/perfil')">
    <mat-icon>account_circle</mat-icon>
    <span>Mi Perfil</span>
  </button>
  <button mat-menu-item (click)="navigateTo('/configuracion')">
    <mat-icon>settings</mat-icon>
    <span>Configuración</span>
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item (click)="logout()">
    <mat-icon>exit_to_app</mat-icon>
    <span>Cerrar Sesión</span>
  </button>
</mat-menu>

<mat-divider></mat-divider>

<!-- El resto de tu contenido (mat-tab-group) permanece igual -->
<mat-tab-group fitInkBarToContent headerPosition="below">
  @for (categoria of categorias(); track $index) {
    <mat-tab [label]="categoria.ruta">
      <div class="carrusel-content">
        <h2>{{ categoria.ruta }}</h2>
        <app-carrusel [conector]="categoria.tarjetas"></app-carrusel>
      </div>
      <app-scroll-botones [conector]="categoria.seccion"></app-scroll-botones>
    </mat-tab>
  }
</mat-tab-group>
