<mat-toolbar>
  <span>CATEGORIAS</span>
</mat-toolbar>
<mat-divider></mat-divider>

<mat-tab-group fitInkBarToContent>
  @for (categoria of categorias(); track $index) {
  <mat-tab [label]="categoria.nombreCategoria">
      <mat-grid-list cols="2" rowHeight="3,5:1">
          @for (seccion of categoria.seccion; track $index) {
          <mat-grid-tile>
              <app-btn-categoria [conector]="seccion"></app-btn-categoria>
          </mat-grid-tile>
          }
      </mat-grid-list>
  </mat-tab>
  }
</mat-tab-group>
