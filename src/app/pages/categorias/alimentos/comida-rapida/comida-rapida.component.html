<app-tool-bar-page title="{{ title }}"></app-tool-bar-page>

<div class="container">
  <!-- Buscador -->
  <div class="row mb-4 centradoAbajo ">
    <div class="col-md-10">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Buscar negocio</mat-label>
        <input matInput [ngModel]="terminoBusqueda()" placeholder="Pizzería, hamburguesas, tacos...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </div>
    <div class="col-md-2 d-flex align-items-center">
      <button mat-raised-button color="primary" class="w-100" (click)="buscarNegocios()">
        Buscar ahora
      </button>
    </div>
  </div>

  <!-- Mensaje cuando no hay resultados -->
  @if (negociosFiltrados().length === 0 && !isLoading()) {
    <div class="row">
      <div class="col-12 text-center my-5">
        <p>No se encontraron negocios que coincidan con tu búsqueda.</p>
      </div>
    </div>
  }

  <!-- Listado de negocios -->
  <div class="row">
    @for (item of negociosFiltrados(); track trackByNegocioId($index, item)) {
      <div class="col-md-4 mb-4">
        <div class="card">
          <img [src]="item.imagen" class="card-img-top" alt="{{ item.nombre}}">
          <div class="card-body">
            <h5 class="card-title">{{ item.nombre }}</h5>
          </div>
          <div class="card-body">
            <h6 class="card-title">{{ item.seccion}}</h6>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Indicador de carga -->
  @if (isLoading()) {
    <div class="row">
      <div class="col-12 d-flex justify-content-center my-5">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
    </div>
  }
</div>
